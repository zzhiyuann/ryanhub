name: RyanHub
options:
  bundleIdPrefix: com.zwang.ryanhub
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.11.2"
  swift-nio-ssh:
    url: https://github.com/apple/swift-nio-ssh.git
    from: "0.9.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "Apple Development"
    INFOPLIST_KEY_CFBundleDisplayName: "Ryan Hub"
targets:
  RyanHub:
    type: application
    platform: iOS
    sources:
      - path: RyanHub
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: SwiftTerm
      - package: swift-nio-ssh
        product: NIOSSH
    info:
      path: RyanHub/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSApplicationCategoryType: public.app-category.productivity
        NSMicrophoneUsageDescription: "Ryan Hub needs microphone access to record voice messages."
        NSCameraUsageDescription: "Ryan Hub needs camera access to capture photos for chat."
        NSPhotoLibraryUsageDescription: "Ryan Hub needs photo library access to send images in chat."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
