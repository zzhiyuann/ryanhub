name: RyanHub
options:
  bundleIdPrefix: com.zwang.ryanhub
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.11.2"
  swift-nio-ssh:
    url: https://github.com/apple/swift-nio-ssh.git
    from: "0.9.0"
  MetaWearablesDAT:
    url: https://github.com/facebook/meta-wearables-dat-ios
    from: "0.4.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: "WRR5PDXKX3"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: "Automatic"
    INFOPLIST_KEY_CFBundleDisplayName: "Ryan Hub"
targets:
  RyanHub:
    type: application
    platform: iOS
    sources:
      - path: RyanHub
        excludes:
          - "**/.DS_Store"
          - "**/DynamicModules/**/spec.json"
    dependencies:
      - package: SwiftTerm
      - package: swift-nio-ssh
        product: NIOSSH
      - sdk: HealthKit.framework
      - sdk: WatchConnectivity.framework
      - package: MetaWearablesDAT
        product: MWDATCore
      - package: MetaWearablesDAT
        product: MWDATCamera
    info:
      path: RyanHub/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSApplicationCategoryType: public.app-category.productivity
        NSMicrophoneUsageDescription: "Ryan Hub needs microphone access to record voice messages."
        NSCameraUsageDescription: "Ryan Hub needs camera access to capture photos for chat."
        NSPhotoLibraryUsageDescription: "Ryan Hub needs photo library access to send images in chat."
        NSHealthShareUsageDescription: "Ryan Hub reads your step count and Apple Watch workouts to track daily activity and calories burned."
        NSMotionUsageDescription: "Ryan Hub uses motion data to detect your activity (walking, running, driving) for the BOBO sensing engine."
        NSLocationWhenInUseUsageDescription: "Ryan Hub uses your location for contextual behavioral sensing in the BOBO module."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Ryan Hub uses background location for continuous behavioral sensing in the BOBO module."
        NSBluetoothAlwaysUsageDescription: "Ryan Hub uses Bluetooth to connect to Meta Ray-Ban smart glasses and detect nearby devices for BOBO sensing."
        # WiFi SSID access also requires the com.apple.developer.networking.wifi-info entitlement.
        # The WiFiSensor will gracefully return nil without it.
        UISupportedExternalAccessoryProtocols:
          - com.meta.ar.wearable
        MWDAT:
          AppLinkURLScheme: "ryanhub://"
          MetaAppID: ""
          ClientToken: ""
          TeamID: "WRR5PDXKX3"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - ryanhub
        UIBackgroundModes:
          - audio
          - fetch
          - processing
          - location
          - bluetooth-peripheral
          - external-accessory
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - com.zwang.ryanhub.bobo-sync
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: RyanHub/RyanHub.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
        aps-environment: development
        # com.apple.developer.networking.wifi-info: true  # Requires paid Apple Developer Program
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  RyanHubWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "10.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zwang.ryanhub.RyanHub.watchapp
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: RyanHubWatch
        excludes:
          - "**/.DS_Store"
    dependencies:
      - sdk: HealthKit.framework
      - sdk: WatchConnectivity.framework
    info:
      path: RyanHubWatch/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.zwang.ryanhub.RyanHub
        NSMicrophoneUsageDescription: "RyanHub Watch streams microphone audio for real-time speech analysis."
        NSHealthShareUsageDescription: "RyanHub Watch uses a mindfulness session to keep the microphone active in the background."
    entitlements:
      path: RyanHubWatch/RyanHubWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
  RyanHubUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RyanHubUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: RyanHub
    settings:
      base:
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        TEST_TARGET_NAME: RyanHub
