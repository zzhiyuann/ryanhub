name: RyanHub
options:
  bundleIdPrefix: com.zwang.ryanhub
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.11.2"
  swift-nio-ssh:
    url: https://github.com/apple/swift-nio-ssh.git
    from: "0.9.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: "WRR5PDXKX3"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: "Automatic"
    INFOPLIST_KEY_CFBundleDisplayName: "Ryan Hub"
targets:
  RyanHub:
    type: application
    platform: iOS
    sources:
      - path: RyanHub
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: SwiftTerm
      - package: swift-nio-ssh
        product: NIOSSH
      - sdk: HealthKit.framework
    info:
      path: RyanHub/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSApplicationCategoryType: public.app-category.productivity
        NSMicrophoneUsageDescription: "Ryan Hub needs microphone access to record voice messages."
        NSCameraUsageDescription: "Ryan Hub needs camera access to capture photos for chat."
        NSPhotoLibraryUsageDescription: "Ryan Hub needs photo library access to send images in chat."
        NSHealthShareUsageDescription: "Ryan Hub reads your step count to estimate daily calories burned."
        NSMotionUsageDescription: "Ryan Hub uses motion data to detect your activity (walking, running, driving) for the POPO sensing engine."
        NSLocationWhenInUseUsageDescription: "Ryan Hub uses your location for contextual behavioral sensing in the POPO module."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Ryan Hub uses background location for continuous behavioral sensing in the POPO module."
        NSBluetoothAlwaysUsageDescription: "POPO detects nearby Bluetooth devices to understand your context (e.g., connected to car, wearing AirPods)."
        # WiFi SSID access also requires the com.apple.developer.networking.wifi-info entitlement.
        # The WiFiSensor will gracefully return nil without it.
        UIBackgroundModes:
          - fetch
          - processing
          - location
        BGTaskSchedulerPermittedIdentifiers:
          - com.zwang.ryanhub.popo-sync
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: RyanHub/RyanHub.entitlements
      properties:
        com.apple.developer.healthkit: true
        # com.apple.developer.networking.wifi-info: true  # Requires paid Apple Developer Program
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  RyanHubUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RyanHubUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: RyanHub
    settings:
      base:
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        TEST_TARGET_NAME: RyanHub
